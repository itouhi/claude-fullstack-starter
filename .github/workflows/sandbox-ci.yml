name: Sandbox CI

# sandbox/** ブランチ専用の CI。
# 本体 ci.yml は sandbox/* の PR をスキップ (block-sandbox-pr で自動クローズされるため) するが、
# sandbox 環境でも push/PR で品質チェックを回せるよう backend・frontend を実行する。
# ジョブ名は ci.yml と揃える (backend / frontend)。

on:
  push:
    branches: ["sandbox/**"]
  pull_request:
    branches: ["sandbox/**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Unit test (Vitest)
        # frontend テストは未導入のブランチがあるため --if-present で存在時のみ実行
        run: npm run test --if-present
      - name: Dependency audit (non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
