name: Docs & Skills CI

# 開発環境の「文章で表現される層」(.claude/skills, docs, ルート *.md) の整合チェック。
# devcontainer CI とは別に、軽量・高速 (数秒) で回す。マークダウン/スキルで実際に壊れること
# (スキル frontmatter / CLAUDE.md とのドリフト / 日英ペア欠け / 内部リンク切れ) を検出する。
# 対象ファイルを変えた PR でのみ実行する。

on:
  pull_request:
    paths:
      - ".claude/skills/**"
      - "docs/**"
      - "**/*.md"
      - ".github/scripts/check_docs_skills.py"
      - ".github/workflows/docs-skills-ci.yml"
  push:
    branches: [main]
    paths:
      - ".claude/skills/**"
      - "docs/**"
      - "**/*.md"
      - ".github/scripts/check_docs_skills.py"
      - ".github/workflows/docs-skills-ci.yml"
  workflow_dispatch:

jobs:
  # A: スキル frontmatter / B: CLAUDE.md 整合 / C: 日英ペア (外部依存なし)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Check skills & docs consistency
        run: python3 .github/scripts/check_docs_skills.py

  # D: 内部リンク切れ検査 (lychee)。--offline で相対リンクの実在のみ確認し、
  # 外部 URL はチェックしない (ネットワーク起因の不安定さを避け、PR ゲートを決定的に保つ)。
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline --no-progress
            'docs/**/*.md' '*.md' '.claude/skills/**/*.md'
          fail: true
