name: Block sandbox PRs

# sandbox/* はスキル検証専用の使い捨てブランチ (複数 sandbox 環境)。main への取り込みは受け付けない。
# head が sandbox/* かつ base が sandbox/* でない PR を自動でクローズしてコメントする。
# sandbox/** 同士の PR (例: sandbox/foo -> sandbox/main) は検証用途のため許可する。
# (git の参照制約上 `sandbox` 単体ブランチと `sandbox/*` は共存できないため、すべて sandbox/* に統一)
# pull_request_target を使うことで、フォーク由来でも base 側の書き込み権限トークンで実行できる
# (コードの checkout は行わないため安全)。

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    if: >-
      startsWith(github.event.pull_request.head.ref, 'sandbox/') &&
      !startsWith(github.event.pull_request.base.ref, 'sandbox/')
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body \
            "🚫 \`sandbox/*\` はスキル検証専用ブランチのため main への PR を受け付けません。この PR は自動クローズされました。変更を取り込みたい場合は \`main\` からフィーチャーブランチを切り直してください。(sandbox/** 同士の PR は許可されています)"
          gh pr close "$PR" --repo "$REPO"
